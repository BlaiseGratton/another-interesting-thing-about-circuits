<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Another Interesting Thing About Circuits</title>
    <script src="/js/index.js" type="module"></script>
  </head>
  <body>
    <a href="/">Home</a>
    <component-container height="1250" width="1000" scale="5">
      <simple-switch
        initial="on"
        x="42"
        y="84"
        on="Reset"
        off="Count"
      ></simple-switch>
      <wire-element x1="67" y1="142" x2="67" y2="174"></wire-element>
      <wire-element x1="67" y1="142" x2="250" y2="142"></wire-element>
      <wire-element x1="250" y1="142" x2="489" y2="56"></wire-element>

      <clock-source x="200" y="50" movement-delay="3000"></clock-source>
      <wire-element x1="258" y1="87" x2="478" y2="56"></wire-element>

      <inverter-relay
        x="467"
        y="85"
        scale=".3"
        port-scale-outer="3.6"
      ></inverter-relay>

      <eight-bit-ripple-counter x="75" y="150"></eight-bit-ripple-counter>

      <binary-to-decimal-bank
        x="75"
        y="214"
        width="400"
      ></binary-to-decimal-bank>

      <ground-bank x="75" y="270"></ground-bank>
    </component-container>
  </body>
</html>
