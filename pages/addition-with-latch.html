<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Another Interesting Thing About Circuits</title>
    <script src="/js/index.js" type="module"></script>
  </head>
  <body>
    <a href="/">Home</a>
    <component-container height="500" width="800" scale="2">
      <switch-bank
        x="5"
        y="35"
        scale="0.53"
        port-scale-outer="21.6"
      ></switch-bank>
      <simple-switch
        x="199"
        y="82"
        scale="0.5"
        off="Bank A"
        on="Bank B"
      ></simple-switch>
      <switch-bank x="220" y="35" scale="0.53"></switch-bank>
      <simple-switch
        x="427"
        y="0"
        scale="0.5"
        on="Write"
        initial="on"
        port-scale-outer="2"
      ></simple-switch>

      <level-triggered-latch-array
        x="448"
        y="22"
        scale="0.53"
        offset-bottom="-40"
      ></level-triggered-latch-array>

      <two-to-one-selector-bank x="220" y="78"></two-to-one-selector-bank>

      <wire-snake
        x="260"
        y="180"
        orientation="vertical"
        height="30"
        width="300"
        top-fan="264,162,575,162"
        bottom-fan="276,236,442,236"
      ></wire-snake>

      <binary-to-decimal-bank
        x="5"
        y="244"
        width="212"
        offset-bottom="30"
      ></binary-to-decimal-bank>
      <binary-to-decimal-bank
        x="253"
        y="244"
        width="212"
        offset-bottom="-30"
      ></binary-to-decimal-bank>

      <eight-bit-adder x="35" y="300"></eight-bit-adder>

      <binary-to-decimal-bank
        x="35"
        y="392"
        width="400"
      ></binary-to-decimal-bank>

      <wire-snake
        x="400"
        y="450"
        orientation="horizontal"
        width="200"
        left-fan="390,440,80,440"
        right-fan="650,400,650,440"
      ></wire-snake>
      <wire-snake
        x="700"
        y="10"
        orientation="vertical"
        height="250"
        top-fan="636,14,471,14"
        bottom-fan="650,400,650,440"
      ></wire-snake>
    </component-container>
  </body>
</html>
