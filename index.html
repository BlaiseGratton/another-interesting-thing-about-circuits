<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Another Interesting Thing About Circuits</title>
    <script src="/js/index.js" type="module"></script>
  </head>
  <body>
    <div>
      <ul>
        <li>
          <a href="./pages/eight-bit-adder">8-bit Adder</a>
        </li>
        <li>
          <a href="./pages/simple-subtraction">Simple Subtraction</a>
        </li>
        <li>
          <a href="./pages/addition-with-latch">Addition With Latch</a>
        </li>
        <li>
          <a href="./pages/eight-bit-ripple-counter">8-bit Ripple Counter</a>
        </li>
        <li>
          <a href="./pages/ram-emulator">RAM Emulator</a>
        </li>
        <li>
          <a href="./pages/16-bit-counter-with-set">16-bit Counter With Set</a>
        </li>
        <li>
          <a href="./pages/separate-instructions-v1"
            >Simple Processor - Separate Instructions</a
          >
        </li>
      </ul>
      <label>Scale</label>
      <input
        id="container-scale"
        type="number"
        step="0.01"
        value="2"
        min="0.01"
      />
      <label> Data</label>
      <input id="data-input" type="text" />
      <button id="load-data">Load</button>
      <button id="clear-data">Clear</button>
      <label>Program</label>
      <input id="program-input" type="text" value="16,32,32,17,255" />
      <button id="load-program">Load</button>
      <button id="clear-program">Clear</button>
    </div>

    <component-container height="1250" width="1000">
      <simple-switch x="17" y="35" port-scale-outer="6.4"></simple-switch>
      <switch-bank x="50" y="33"></switch-bank>
      <simple-switch x="433" y="35" port-scale-outer="6.4"></simple-switch>
      <zero-flag x="50" y="100"></zero-flag>

      <ground-bank x="50" y="220"></ground-bank>
    </component-container>
  </body>
  <script>
    const scale = document.querySelector('#container-scale')
    const container = document.querySelector('component-container')
    container.setAttribute('scale', scale.value)
    scale.onchange = (event) => {
      container.setAttribute('scale', event.target.value)
    }

    const dataInput = document.querySelector('#data-input')
    const dataRAM = document.querySelector('#data-ram')
    const loadDataButton = document.querySelector('#load-data')
    const clearDataButton = document.querySelector('#clear-data')

    const programInput = document.querySelector('#program-input')
    const programRAM = document.querySelector('#program-ram')
    const loadProgramButton = document.querySelector('#load-program')
    const clearProgramButton = document.querySelector('#clear-program')

    loadDataButton.onclick = () => {
      dataInput.value.split(',').map((n, index) => {
        const rep = n ? parseInt(n).toString(2).padStart(dataRAM.bits, '0') : ''
        const ramSlot = dataRAM.array[index]
        ramSlot.value = rep
        ramSlot.element.textContent = rep
        dataRAM.select()
      })
    }

    opCodes = {
      LOD: '00010000',
      STO: '00010001',
      ADD: '00100000',
      SUB: '00100001',
      ADC: '00100010',
      SBB: '00100011',
      JMP: '00110000',
      JZ: '00110001',
      JC: '00110010',
      JNZ: '00110011',
      JNC: '00110100',
      HLT: '11111111'
    }

    loadProgramButton.onclick = () => {
      programInput.value.split(',').map((inst, index) => {
        const ramSlot = programRAM.array[index]
        let rep = ''
        if (parseInt(inst)) {
          rep = parseInt(inst).toString(2).padStart(programRAM.bits, '0')
        } else {
          rep = opCodes[inst]
        }
        ramSlot.value = rep
        ramSlot.element.textContent = rep
        programRAM.select()
      })
    }

    const clearRAM = (ram) => () => {
      ram.array.forEach((slot) => {
        slot.value = ''
        slot.element.textContent = ''
      })
    }

    clearDataButton.onclick = clearRAM(dataRAM)
    clearProgramButton.onclick = clearRAM(programRAM)

    this.logging = {
      wire: {
        addWireConnection: false,
        disconnectWire: false
      },
      componentGraph: {
        determineFlow: false
      }
    }
  </script>
</html>
