<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Another Interesting Thing About Circuits</title>
    <script src="/js/index.js" type="module"></script>
  </head>
  <body>
    <a href="./pages/eight-bit-adder.html">8-bit Adder</a>
    <a href="./pages/simple-subtraction.html">Simple Subtraction</a>
    <a href="./pages/addition-with-latch.html">Addition With Latch</a>
    <a href="./pages/eight-bit-ripple-counter.html">8-bit Ripple Counter</a>
    <label>Scale</label>
    <input
      id="container-scale"
      type="number"
      step="0.01"
      value="2"
      min="0.01"
    />

    <component-container height="1250" width="1000">
      <simple-switch x="10" y="50"></simple-switch>
      <switch-bank x="50" y="40"></switch-bank>
      <eight-to-one-selector x="50" y="107"></eight-to-one-selector>
      <ground-bank x="50" y="224"></ground-bank>
    </component-container>
  </body>
  <script>
    const scale = document.querySelector('#container-scale')
    const container = document.querySelector('component-container')
    container.setAttribute('scale', scale.value)
    scale.onchange = (event) => {
      container.setAttribute('scale', event.target.value)
    }
    this.logging = {
      wire: {
        addWireConnection: false,
        disconnectWire: false
      },
      componentGraph: {
        determineFlow: false
      }
    }
  </script>
</html>
